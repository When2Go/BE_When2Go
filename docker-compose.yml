services:
  app:
    image: ${APP_IMAGE}
    container_name: when2go-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PWD: ${DB_PWD}
    depends_on:
      when2go-redis:
        condition: service_healthy
    networks:
      - when2go-net
    restart: unless-stopped

  when2go-redis:
    image: redis:7-alpine
    container_name: when2go-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - when2go-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: when2go-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      GF_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/infrastructure.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - when2go-net
    restart: unless-stopped

networks:
  when2go-net:
    driver: bridge

volumes:
  redis-data:
  grafana-data:
