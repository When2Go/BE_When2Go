name: Deploy to EC2 via ECR

on:
  push:
    branches:
      - main
      - 743hw4n/chore/9/deploy
    paths-ignore:
      - README.md
      - docs/**

  workflow_dispatch:

env:
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA_TAG: ${{ github.sha }}
        run: |
          set -e

          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG" \
            .

          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$SHA_TAG"

      - name: Copy docker-compose.yml to API EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ${{ secrets.EC2_API_USER }}
          key: ${{ secrets.EC2_API_SSH_KEY }}
          source: docker-compose.yml
          target: /home/${{ secrets.EC2_API_USER }}/when2go

      - name: Deploy to API EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ${{ secrets.EC2_API_USER }}
          key: ${{ secrets.EC2_API_SSH_KEY }}
          script: |
            set -e

            cd /home/${{ secrets.EC2_API_USER }}/when2go

            export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY }}'
            export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_KEY }}'
            export AWS_DEFAULT_REGION='${{ secrets.AWS_REGION }}'

            cat > .env <<'EOF'
            APP_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PWD=${{ secrets.DB_PWD }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
            EOF
            chmod 600 .env

            aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" \
              | docker login --username AWS --password-stdin "${{ steps.login-ecr.outputs.registry }}"

            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Copy docker-compose.yml to Scheduler EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_SCHEDULER_HOST }}
          username: ${{ secrets.EC2_SCHEDULER_USER }}
          key: ${{ secrets.EC2_SCHEDULER_SSH_KEY }}
          source: docker-compose.yml
          target: /home/${{ secrets.EC2_SCHEDULER_USER }}/when2go

      - name: Deploy to Scheduler EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SCHEDULER_HOST }}
          username: ${{ secrets.EC2_SCHEDULER_USER }}
          key: ${{ secrets.EC2_SCHEDULER_SSH_KEY }}
          script: |
            set -e

            cd /home/${{ secrets.EC2_SCHEDULER_USER }}/when2go

            export AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY }}'
            export AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_KEY }}'
            export AWS_DEFAULT_REGION='${{ secrets.AWS_REGION }}'

            cat > .env <<'EOF'
            APP_IMAGE=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PWD=${{ secrets.DB_PWD }}
            EOF
            chmod 600 .env

            aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" \
              | docker login --username AWS --password-stdin "${{ steps.login-ecr.outputs.registry }}"

            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f